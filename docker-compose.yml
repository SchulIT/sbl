services:
  web:
    build: .
    restart: always
    ports:
      - "8080:80" # Port 8080 nach Belieben konfigurieren
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    volumes:
      - app_covers:/app/public/covers
      - app_saml:/app/saml
      - app_images:/app/public/images # Optional (für Logo)

  db:
    image: mariadb:10.11
    restart: always
    env_file:
      - .env.local
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  app_covers:
  app_saml:
  app_logo:
  db_data:
